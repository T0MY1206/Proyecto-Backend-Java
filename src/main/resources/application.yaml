spring:
  application:
    name: pruebatecsupermercado
  datasource:
    url: "jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:6543/postgres?sslmode=require"
    username: "postgres.bjvfvrqcsbuiqntyhzwv"
    password: "Q8yGGj1QdH8tQ9IP"
    hikari:
      # Pool para microservicio: varias peticiones concurrentes según atributos en la URL
      minimum-idle: 2
      maximum-pool-size: 20
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      pool-name: PruebaTecSupermercadoPool
      auto-commit: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        default_schema: public
        jdbc:
          batch_size: 25
          fetch_size: 50
        order_inserts: true
        order_updates: true
        query:
          in_clause_parameter_padding: true
        default_batch_fetch_size: 16
    open-in-view: false
  sql:
    init:
      mode: never
server:
  port: 8080

# Swagger / OpenAPI: documentación por contexto (supermercado vs otros)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
  show-actuator: false