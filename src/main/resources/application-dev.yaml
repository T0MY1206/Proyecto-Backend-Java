spring:
  datasource:
    url: jdbc:h2:mem:supermercadodb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.example.demo: DEBUG
    org.hibernate.SQL: DEBUG
